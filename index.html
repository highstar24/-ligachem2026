<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>카나프테라퓨틱스 카드뉴스(S)</title>
    <meta property="og:title" content="카나프테라퓨틱스 카드뉴스(S)">
    <meta property="og:description" content="주가 하락의 진실과 2025년 핵심 모멘텀 분석">
    <meta property="og:image" content="https://cdn.jsdelivr.net/gh/highstar24/logo@main/logo_png.png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

        :root { 
            --orange: #FF9B54; 
            --purple: #8B5FDF; 
            --blue: #4A72C9; 
            --green: #B3E879; 
            --dark: #2E2A50; 
            --neon: #E1FB62;
            --white: #FFFFFF;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; word-break: keep-all; }
        body, html { width: 100vw; height: 100vh; overflow: hidden; background-color: var(--dark); touch-action: none; }

        /* 🚨 슬라이드 래퍼 추가: 이제 카드를 무한으로 복제 배치할 수 있도록 설정 */
        .carousel-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .carousel-container { 
            display: flex; 
            width: 100%; 
            height: 100vh; 
            /* 🚨 transition을 자바스크립트에서 제어할 수 있도록 여기서는 기본만 남김 */
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1); 
        }

        .card { flex-shrink: 0; width: 100vw; height: 100vh; position: relative; display: flex; flex-direction: column; padding: 0; }
        .header-section { padding: 40px 30px 20px; display: flex; flex-direction: column; position: relative; z-index: 2; height: 180px; }
        .content-section { flex: 1; border-radius: 30px 30px 0 0; padding: 35px 25px 90px; overflow-y: auto; display: flex; flex-direction: column; gap: 18px; touch-action: pan-y; }
